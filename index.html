<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AXPC Morning Clips Generator</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Source+Sans+3:wght@300;400;500;600&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --navy: #0f1f38; --navy-mid: #1a3155; --gold: #c8a84b; --gold-light: #e8c97a;
    --cream: #f9f6f0; --white: #fff; --gray-200: #e8e3d9; --gray-400: #9a9485;
    --gray-600: #5c5850; --green: #2d6a4f; --red: #9b2226; --text: #1a1714;
  }
  body { font-family: 'Source Sans 3', sans-serif; background: var(--cream); color: var(--text); min-height: 100vh; }
  .masthead { background: var(--navy); border-bottom: 3px solid var(--gold); }
  .masthead-inner { max-width: 860px; margin: 0 auto; padding: 24px 32px 20px; display: flex; align-items: flex-end; justify-content: space-between; }
  .masthead-title { font-family: 'Playfair Display', serif; font-size: 26px; color: #fff; }
  .masthead-sub { font-size: 11px; color: var(--gold-light); letter-spacing: 0.1em; text-transform: uppercase; margin-top: 3px; font-weight: 300; }
  .masthead-badge { font-size: 11px; color: var(--gold); border: 1px solid var(--gold); padding: 4px 10px; border-radius: 2px; white-space: nowrap; }
  .main { max-width: 860px; margin: 0 auto; padding: 32px 32px 60px; }
  .card { background: var(--white); border: 1px solid var(--gray-200); border-radius: 4px; padding: 22px 26px; margin-bottom: 18px; }
  .card-label { font-size: 10px; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase; color: var(--gold); margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
  .card-label::after { content: ''; flex: 1; height: 1px; background: var(--gray-200); }
  .price-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }
  .price-group-label { font-size: 11px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--navy-mid); padding-bottom: 6px; border-bottom: 1px solid var(--gray-200); margin-bottom: 8px; }
  .field { display: flex; flex-direction: column; gap: 5px; margin-bottom: 6px; }
  .field label { font-size: 11px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--gray-600); }
  input[type="text"], input[type="date"] { border: 1px solid var(--gray-200); border-radius: 3px; padding: 8px 11px; font-size: 14px; font-family: 'Source Sans 3', sans-serif; color: var(--text); background: var(--white); width: 100%; transition: border-color 0.15s; }
  input:focus { outline: none; border-color: var(--navy); }
  input::placeholder { color: var(--gray-400); }
  .btn-generate { width: 100%; background: var(--navy); color: #fff; border: none; border-radius: 3px; padding: 14px; font-size: 15px; font-family: 'Source Sans 3', sans-serif; font-weight: 600; cursor: pointer; transition: background 0.2s; margin-top: 4px; }
  .btn-generate:hover:not(:disabled) { background: var(--navy-mid); }
  .btn-generate:disabled { opacity: 0.45; cursor: not-allowed; }
  .progress-wrap { display: none; margin-top: 18px; }
  .progress-wrap.show { display: block; }
  .progress-track { height: 3px; background: var(--gray-200); border-radius: 2px; overflow: hidden; margin-bottom: 12px; }
  .progress-bar { height: 100%; background: linear-gradient(90deg, var(--navy), var(--gold)); width: 0%; transition: width 0.6s ease; }
  .steps-row { display: flex; gap: 7px; flex-wrap: wrap; }
  .step-pill { font-size: 11px; padding: 3px 11px; border-radius: 20px; border: 1px solid var(--gray-200); color: var(--gray-400); background: var(--white); transition: all 0.2s; }
  .step-pill.active { border-color: var(--navy); color: var(--navy); background: #eef2f8; font-weight: 600; }
  .step-pill.done { border-color: var(--green); color: var(--green); background: #edf7f2; font-weight: 600; }
  .step-pill.done::before { content: '✓ '; }
  .status-msg { font-size: 13px; color: var(--gray-600); margin-top: 10px; min-height: 18px; font-style: italic; }
  .status-msg.error { color: var(--red); font-style: normal; font-weight: 500; }
  .status-msg.success { color: var(--green); font-style: normal; font-weight: 500; }
  .output-wrap { display: none; margin-top: 24px; }
  .output-wrap.show { display: block; }
  .output-actions { display: flex; gap: 10px; margin-bottom: 18px; }
  .btn-action { flex: 1; padding: 11px; border: 1px solid var(--gray-200); border-radius: 3px; background: var(--white); font-size: 13px; font-family: 'Source Sans 3', sans-serif; font-weight: 600; color: var(--navy); cursor: pointer; transition: background 0.15s; }
  .btn-action:hover { background: var(--gray-200); }
  .btn-action.primary { background: var(--gold); border-color: var(--gold); color: var(--navy); }
  .btn-action.primary:hover { background: var(--gold-light); }
  #clipsOutput { background: var(--white); border: 1px solid var(--gray-200); border-radius: 4px; padding: 32px 36px; font-family: 'Times New Roman', serif; line-height: 1.6; }
  #clipsOutput .clips-header { text-align: center; margin-bottom: 20px; }
  #clipsOutput .clips-logo { max-width: 260px; height: auto; margin-bottom: 8px; display: block; margin-left: auto; margin-right: auto; }
  #clipsOutput .clips-title { font-size: 16px; font-weight: 700; text-align: center; }
  #clipsOutput .sec-heading { font-size: 13px; font-weight: 700; text-decoration: underline; margin: 22px 0 10px; }
  #clipsOutput .price-block { margin-bottom: 4px; font-size: 13px; }
  #clipsOutput .price-lbl { font-weight: 700; display: inline-block; min-width: 110px; }
  #clipsOutput .price-val { display: inline-block; min-width: 60px; }
  #clipsOutput .price-chg { color: #3a7d44; font-style: italic; }
  #clipsOutput .article { margin-bottom: 18px; }
  #clipsOutput .article-title a { font-size: 13px; font-weight: 700; color: #1155CC; text-decoration: underline; }
  #clipsOutput .article-source { font-size: 12px; font-style: italic; color: #555; margin: 2px 0 4px; }
  #clipsOutput .article-snippet { font-size: 12px; color: #222; line-height: 1.65; }
  #clipsOutput .article-snippet b { color: #0f1f38; }
  #clipsOutput .empty-note { font-size: 13px; color: #999; font-style: italic; }
  #clipsOutput .section-divider { border: none; border-top: 1.5px solid #333; margin: 6px 0 12px; }
  .footer { text-align: center; font-size: 11px; color: var(--gray-400); margin-top: 36px; padding-top: 18px; border-top: 1px solid var(--gray-200); }
  @media (max-width:600px) { .price-grid { grid-template-columns:1fr 1fr; } .main { padding:20px 16px 40px; } .masthead-inner { flex-direction:column; align-items:flex-start; gap:10px; } }
</style>
</head>
<body>

<div class="masthead">
  <div class="masthead-inner">
    <div>
      <div class="masthead-title">AXPC Morning Clips</div>
      <div class="masthead-sub">American Exploration &amp; Production Council — Daily Media Digest</div>
    </div>
    <div class="masthead-badge">SerpAPI Powered</div>
  </div>
</div>

<div class="main">

  <div class="card">
    <div class="card-label">Clips Date</div>
    <div class="field" style="max-width:200px;">
      <label>Date</label>
      <input type="date" id="clipsDate" />
    </div>
  </div>

  <div class="card">
    <div class="card-label">Commodity Prices</div>
    <div class="price-grid">
      <div>
        <div class="price-group-label">Oil (WTI)</div>
        <div class="field"><label>Price ($)</label><input type="text" id="wti" placeholder="90.44" /></div>
        <div class="field"><label>Change</label><input type="text" id="wtiC" placeholder="+1.76" /></div>
      </div>
      <div>
        <div class="price-group-label">Brent Crude</div>
        <div class="field"><label>Price ($)</label><input type="text" id="brent" placeholder="95.64" /></div>
        <div class="field"><label>Change</label><input type="text" id="brentC" placeholder="+1.35" /></div>
      </div>
      <div>
        <div class="price-group-label">Natural Gas</div>
        <div class="field"><label>Price ($)</label><input type="text" id="gas" placeholder="3.04" /></div>
        <div class="field"><label>Change</label><input type="text" id="gasC" placeholder="+0.15" /></div>
      </div>
    </div>
  </div>

  <button class="btn-generate" id="generateBtn" onclick="runClips()">Generate Morning Clips →</button>

  <div class="progress-wrap" id="progressWrap">
    <div class="progress-track"><div class="progress-bar" id="progressBar"></div></div>
    <div class="steps-row">
      <div class="step-pill" id="s1">AXPC Mentions</div>
      <div class="step-pill" id="s2">Member News</div>
      <div class="step-pill" id="s3">Industry News</div>
    </div>
    <div class="status-msg" id="statusMsg"></div>
  </div>

  <div class="output-wrap" id="outputWrap">
    <div class="output-actions">
      <button class="btn-action primary" id="copyBtn" onclick="copyClips()">⎘ Copy to Clipboard</button>
      <button class="btn-action" onclick="printClips()">⎙ Print / Save as PDF</button>
    </div>
    <div id="clipsOutput"></div>
  </div>

  <div class="footer">AXPC Morning Clips Generator &nbsp;·&nbsp; Approved sources only &nbsp;·&nbsp; For internal use only</div>
</div>

<script>
// ── CONFIG ───────────────────────────────────────────────────────────────────
const SERP_KEY = "212c1a1ecaf59fc98c5236c9854db975a83650f7a1a843c106f1aa13890c0100";

const APPROVED = [
  "wsj.com","tulsaworld.com","denverpost.com","bismarcktribune.com",
  "post-gazette.com","inquirer.com","politico.com","bloomberg.com",
  "reuters.com","apnews.com","usatoday.com","ft.com","eenews.net",
  "foxnews.com","cbsnews.com","abcnews.go.com","nbcnews.com","msnbc.com",
  "cnn.com","oklahoman.com","nypost.com","nytimes.com",
  "washingtonexaminer.com","washingtonpost.com"
];

// Split sites into two groups to keep query length manageable
const SITES_A = "site:wsj.com OR site:reuters.com OR site:bloomberg.com OR site:nytimes.com OR site:washingtonpost.com OR site:politico.com OR site:eenews.net OR site:foxnews.com OR site:cnn.com OR site:apnews.com OR site:cbsnews.com OR site:ft.com";
const SITES_B = "site:usatoday.com OR site:nypost.com OR site:washingtonexaminer.com OR site:denverpost.com OR site:tulsaworld.com OR site:bismarcktribune.com OR site:msnbc.com OR site:nbcnews.com OR site:oklahoman.com OR site:abcnews.go.com OR site:inquirer.com OR site:post-gazette.com";

const SOURCE_NAMES = {
  'wsj.com':'The Wall Street Journal','bloomberg.com':'Bloomberg',
  'reuters.com':'Reuters','nytimes.com':'The New York Times',
  'washingtonpost.com':'The Washington Post','politico.com':'Politico',
  'eenews.net':'E&E News','foxnews.com':'Fox News','cnn.com':'CNN',
  'cbsnews.com':'CBS News','nbcnews.com':'NBC News','apnews.com':'AP News',
  'ft.com':'Financial Times','usatoday.com':'USA Today',
  'nypost.com':'New York Post','washingtonexaminer.com':'Washington Examiner',
  'msnbc.com':'MSNBC','inquirer.com':'The Philadelphia Inquirer',
  'denverpost.com':'The Denver Post','tulsaworld.com':'Tulsa World',
  'go.com':'ABC News','abcnews.go.com':'ABC News',
  'post-gazette.com':'Pittsburgh Post-Gazette',
  'bismarcktribune.com':'Bismarck Tribune','oklahoman.com':'The Oklahoman'
};

const MEMBERS = [
  "Antero Resources","Apache Corp","Ascent Resources","BKV",
  "California Resources Corporation","Caturus Energy","Chevron","Chord Energy",
  "Civitas Resources","ConocoPhillips","Coterra","Crescent Point Energy",
  "Devon Energy","Diamondback Energy","Diversified Energy","Expand Energy",
  "EOG Resources","EQT Corp","Hilcorp Energy","Jonah Energy",
  "Magnolia Oil & Gas","Mewbourne Oil","Northern Oil and Gas","Ovintiv",
  "Permian Resources","PureWest Energy","Range Resources","Seneca Resources",
  "SM Energy","TG Natural Resources"
];

// ── INIT ─────────────────────────────────────────────────────────────────────
document.getElementById('clipsDate').value = new Date().toISOString().split('T')[0];
const $ = id => document.getElementById(id);
function setStep(n,s){ $('s'+n).className='step-pill '+s; }
function setProgress(p){ $('progressBar').style.width=p+'%'; }
function setStatus(msg,cls){ const e=$('statusMsg'); e.textContent=msg; e.className='status-msg '+(cls||''); }
function escHtml(t){ return (t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function getSource(url, ds) {
  try {
    const host = new URL(url).hostname.replace(/^www\./,'');
    const k2 = host.split('.').slice(-2).join('.');
    const k3 = host.split('.').slice(-3).join('.');
    const name = SOURCE_NAMES[host] || SOURCE_NAMES[k2] || SOURCE_NAMES[k3] || host;
    return name + ', ' + ds;
  } catch(e){ return ds; }
}

function isApproved(url) {
  try {
    const host = new URL(url).hostname.replace(/^www\./,'');
    return APPROVED.some(s => host === s || host.endsWith('.'+s));
  } catch(e){ return false; }
}

function dedup(arr) {
  const seen = new Set();
  return arr.filter(a=>{ if(!a.url||seen.has(a.url)) return false; seen.add(a.url); return true; });
}

function findMembers(item) {
  const text = ((item.title||'')+(item.snippet||'')).toLowerCase();
  return MEMBERS.filter(m=>text.includes(m.toLowerCase()));
}

// ── SERP API SEARCH ──────────────────────────────────────────────────────────
async function serpSearch(query, sites) {
  const fullQuery = `${query} ${sites}`;
  const url = `https://serpapi.com/search.json?engine=google&q=${encodeURIComponent(fullQuery)}&api_key=${SERP_KEY}&num=10&tbs=qdr:d&gl=us&hl=en&no_cache=true`;
  const res = await fetch(url);
  if (!res.ok) {
    const err = await res.json().catch(()=>({}));
    throw new Error(err.error || 'Search failed: ' + res.status);
  }
  const data = await res.json();
  return (data.organic_results || []);
}

function processResults(rawItems, dateShort) {
  return rawItems
    .filter(r => isApproved(r.link || ''))
    .map(r => ({
      title: r.title || '',
      url: r.link || '',
      source: getSource(r.link || '', dateShort),
      snippet: r.snippet || ''
    }));
}

// ── MAIN ─────────────────────────────────────────────────────────────────────
async function runClips() {
  const dv = $('clipsDate').value;
  const ds = dv
    ? new Date(dv+'T12:00:00').toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'})
    : new Date().toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'});

  const prices = {
    wti:$('wti').value.trim(), wtiC:$('wtiC').value.trim(),
    brent:$('brent').value.trim(), brentC:$('brentC').value.trim(),
    gas:$('gas').value.trim(), gasC:$('gasC').value.trim()
  };

  $('generateBtn').disabled=true;
  $('outputWrap').className='output-wrap';
  $('progressWrap').className='progress-wrap show';
  ['s1','s2','s3'].forEach(id=>$(id).className='step-pill');
  setProgress(0);

  try {
    // STEP 1: AXPC mentions
    setStep(1,'active'); setStatus('Searching AXPC mentions...');
    const axpcQuery = '"AXPC" OR "American Exploration and Production Council" OR "Anne Bradbury" OR "Parker Kasmer" OR "Tom Jorden" OR "Wendy Kirchoff" OR "Zach Gillan"';
    const [axpcA, axpcB] = await Promise.all([
      serpSearch(axpcQuery, SITES_A),
      serpSearch(axpcQuery, SITES_B)
    ]);
    const axpc = dedup(processResults([...axpcA,...axpcB], ds));
    setStep(1,'done'); setProgress(33);

    // STEP 2: Member news — 4 parallel searches covering all members across both site groups
    setStep(2,'active'); setStatus('Searching member company news...');
    const mq1 = MEMBERS.slice(0,15).map(m=>`"${m}"`).join(' OR ');
    const mq2 = MEMBERS.slice(15).map(m=>`"${m}"`).join(' OR ');
    const [m1a, m1b, m2a, m2b] = await Promise.all([
      serpSearch(mq1, SITES_A),
      serpSearch(mq1, SITES_B),
      serpSearch(mq2, SITES_A),
      serpSearch(mq2, SITES_B)
    ]);
    const axpcUrls = new Set(axpc.map(a=>a.url));
    const member = dedup(processResults([...m1a,...m1b,...m2a,...m2b], ds))
      .filter(a=>!axpcUrls.has(a.url))
      .map(a=>({...a, boldTerms: findMembers(a)}))
      .filter(a=>a.boldTerms.length>0);
    setStep(2,'done'); setProgress(66);

    // STEP 3: Industry news — parallel across both site groups
    setStep(3,'active'); setStatus('Searching industry news...');
    const iq = '"oil prices" OR "natural gas" OR "LNG exports" OR "fracking" OR "methane" OR "energy policy" OR "federal lands" OR "permitting" OR "energy security" OR "crude oil" OR "American energy" OR "Strait of Hormuz"';
    const [ia, ib] = await Promise.all([
      serpSearch(iq, SITES_A),
      serpSearch(iq, SITES_B)
    ]);
    const memberUrls = new Set(member.map(a=>a.url));
    const industry = dedup(processResults([...ia,...ib], ds))
      .filter(a=>!axpcUrls.has(a.url)&&!memberUrls.has(a.url));
    setStep(3,'done'); setProgress(100);

    renderOutput({axpc,member,industry},ds,prices);
    setStatus('Done! Copy to clipboard or print/save as PDF.','success');
    $('outputWrap').className='output-wrap show';

  } catch(err) {
    setStatus('Error: '+err.message,'error');
    console.error(err);
  }
  $('generateBtn').disabled=false;
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function boldify(text, terms) {
  if(!terms||!terms.length) return escHtml(text);
  let s = escHtml(text);
  terms.forEach(t=>{
    const re = new RegExp('('+t.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi');
    s = s.replace(re,'<b>$1</b>');
  });
  return s;
}

function articleHtml(a, bold) {
  return `<div class="article">
    <div class="article-title"><a href="${escHtml(a.url)}" target="_blank">${escHtml(a.title)}</a></div>
    <div class="article-source">${escHtml(a.source)}</div>
    <div class="article-snippet">${bold?boldify(a.snippet,a.boldTerms):escHtml(a.snippet)}</div>
  </div>`;
}

function renderOutput({axpc,member,industry},ds,prices) {
  const isPos = v => v && !v.startsWith('-');
  const ph = [
    prices.wti?`<div class="price-block"><span class="price-lbl">Oil (WTI):</span><span class="price-val">$${escHtml(prices.wti)}</span>${prices.wtiC?`&nbsp;&nbsp;<span class="price-chg">${escHtml(prices.wtiC)} <em>(from previous close)</em></span>`:''}</div>`:'',
    prices.brent?`<div class="price-block"><span class="price-lbl">Brent Crude:</span><span class="price-val">$${escHtml(prices.brent)}</span>${prices.brentC?`&nbsp;&nbsp;<span class="price-chg">${escHtml(prices.brentC)} <em>(from previous close)</em></span>`:''}</div>`:'',
    prices.gas?`<div class="price-block"><span class="price-lbl">Natural Gas:</span><span class="price-val">$${escHtml(prices.gas)}</span>${prices.gasC?`&nbsp;&nbsp;<span class="price-chg">${escHtml(prices.gasC)} <em>(from previous close)</em></span>`:''}</div>`:''
  ].join('');

  const sec = (arts,bold) => arts&&arts.length
    ? arts.map(a=>articleHtml(a,bold)).join('')
    : '<p class="empty-note">No articles found in the past 24 hours.</p>';

  $('clipsOutput').innerHTML = `
    <div class="clips-header">
      <img class="clips-logo" src="https://axpc.org/wp-content/uploads/2021/02/AXPC-logo.png" onerror="this.style.display='none'" alt="AXPC" />
      <div class="clips-title">Daily News Clips &nbsp; ${escHtml(ds)}</div>
    </div>
    ${ph?`<div class="sec-heading">Commodity Prices</div><hr class="section-divider">${ph}`:''}
    <div class="sec-heading">AXPC Mentions</div><hr class="section-divider">${sec(axpc,false)}
    <div class="sec-heading">Industry News</div><hr class="section-divider">${sec(industry,false)}
    <div class="sec-heading">Select Member News</div><hr class="section-divider">${sec(member,true)}
  `;
}

// ── COPY & PRINT ──────────────────────────────────────────────────────────────
function copyClips() {
  const el = $('clipsOutput');
  const range = document.createRange();
  range.selectNodeContents(el);
  const sel = window.getSelection();
  sel.removeAllRanges(); sel.addRange(range);
  document.execCommand('copy');
  sel.removeAllRanges();
  $('copyBtn').textContent='✓ Copied!';
  setTimeout(()=>$('copyBtn').textContent='⎘ Copy to Clipboard',2000);
}

function printClips() {
  const w = window.open('','_blank');
  w.document.write(`<!DOCTYPE html><html><head><title>AXPC Morning Clips</title><style>
    body{font-family:'Times New Roman',serif;max-width:720px;margin:32px auto;font-size:12px;line-height:1.6;color:#222;}
    .clips-header{text-align:center;margin-bottom:16px;}
    .clips-logo{max-width:220px;height:auto;margin-bottom:6px;}
    .clips-title{font-size:15px;font-weight:700;}
    .sec-heading{font-size:13px;font-weight:700;text-decoration:underline;margin:18px 0 4px;}
    hr{border:none;border-top:1.5px solid #333;margin:4px 0 10px;}
    .article{margin-bottom:16px;}
    .article-title a{font-weight:700;color:#1155CC;text-decoration:underline;}
    .article-source{font-size:11px;font-style:italic;color:#555;margin:2px 0 4px;}
    .article-snippet{font-size:11px;color:#222;}
    b{color:#0f1f38;font-weight:700;}
    .price-block{margin-bottom:4px;font-size:12px;}
    .price-lbl{font-weight:700;display:inline-block;min-width:110px;}
    .price-val{min-width:60px;display:inline-block;}
    .price-chg{color:#3a7d44;}
    .empty-note{font-size:12px;color:#999;font-style:italic;}
  </style></head><body>${$('clipsOutput').innerHTML}</body></html>`);
  w.document.close(); w.print();
}
</script>
</body>
</html>
