<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AXPC Morning Clips Generator</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Source+Sans+3:wght@300;400;500;600&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --navy: #0f1f38; --navy-mid: #1a3155; --gold: #c8a84b; --gold-light: #e8c97a;
    --cream: #f9f6f0; --white: #fff; --gray-200: #e8e3d9; --gray-400: #9a9485;
    --gray-600: #5c5850; --green: #2d6a4f; --red: #9b2226; --text: #1a1714;
  }
  body { font-family: 'Source Sans 3', sans-serif; background: var(--cream); color: var(--text); min-height: 100vh; }
  .masthead { background: var(--navy); border-bottom: 3px solid var(--gold); }
  .masthead-inner { max-width: 860px; margin: 0 auto; padding: 24px 32px 20px; display: flex; align-items: flex-end; justify-content: space-between; }
  .masthead-title { font-family: 'Playfair Display', serif; font-size: 26px; color: #fff; }
  .masthead-sub { font-size: 11px; color: var(--gold-light); letter-spacing: 0.1em; text-transform: uppercase; margin-top: 3px; font-weight: 300; }
  .masthead-badge { font-size: 11px; color: var(--gold); border: 1px solid var(--gold); padding: 4px 10px; border-radius: 2px; letter-spacing: 0.06em; white-space: nowrap; }
  .main { max-width: 860px; margin: 0 auto; padding: 32px 32px 60px; }
  .card { background: var(--white); border: 1px solid var(--gray-200); border-radius: 4px; padding: 22px 26px; margin-bottom: 18px; }
  .card-label { font-size: 10px; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase; color: var(--gold); margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
  .card-label::after { content: ''; flex: 1; height: 1px; background: var(--gray-200); }
  .price-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }
  .price-group-label { font-size: 11px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--navy-mid); padding-bottom: 6px; border-bottom: 1px solid var(--gray-200); margin-bottom: 8px; }
  .field { display: flex; flex-direction: column; gap: 5px; margin-bottom: 6px; }
  .field label { font-size: 11px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--gray-600); }
  input[type="text"], input[type="date"], input[type="password"] { border: 1px solid var(--gray-200); border-radius: 3px; padding: 8px 11px; font-size: 14px; font-family: 'Source Sans 3', sans-serif; color: var(--text); background: var(--white); width: 100%; transition: border-color 0.15s; }
  input:focus { outline: none; border-color: var(--navy); }
  input::placeholder { color: var(--gray-400); }
  .btn-generate { width: 100%; background: var(--navy); color: #fff; border: none; border-radius: 3px; padding: 14px; font-size: 15px; font-family: 'Source Sans 3', sans-serif; font-weight: 600; letter-spacing: 0.05em; cursor: pointer; transition: background 0.2s; margin-top: 4px; }
  .btn-generate:hover:not(:disabled) { background: var(--navy-mid); }
  .btn-generate:disabled { opacity: 0.45; cursor: not-allowed; }
  .progress-wrap { display: none; margin-top: 18px; }
  .progress-wrap.show { display: block; }
  .progress-track { height: 3px; background: var(--gray-200); border-radius: 2px; overflow: hidden; margin-bottom: 12px; }
  .progress-bar { height: 100%; background: linear-gradient(90deg, var(--navy), var(--gold)); width: 0%; transition: width 0.6s ease; }
  .steps-row { display: flex; gap: 7px; flex-wrap: wrap; }
  .step-pill { font-size: 11px; padding: 3px 11px; border-radius: 20px; border: 1px solid var(--gray-200); color: var(--gray-400); background: var(--white); transition: all 0.2s; }
  .step-pill.active { border-color: var(--navy); color: var(--navy); background: #eef2f8; font-weight: 600; }
  .step-pill.done { border-color: var(--green); color: var(--green); background: #edf7f2; font-weight: 600; }
  .step-pill.done::before { content: '✓ '; }
  .status-msg { font-size: 13px; color: var(--gray-600); margin-top: 10px; min-height: 18px; font-style: italic; }
  .status-msg.error { color: var(--red); font-style: normal; font-weight: 500; }
  .status-msg.success { color: var(--green); font-style: normal; font-weight: 500; }
  .output-wrap { display: none; margin-top: 24px; }
  .output-wrap.show { display: block; }
  .output-actions { display: flex; gap: 10px; margin-bottom: 18px; }
  .btn-action { flex: 1; padding: 11px; border: 1px solid var(--gray-200); border-radius: 3px; background: var(--white); font-size: 13px; font-family: 'Source Sans 3', sans-serif; font-weight: 600; color: var(--navy); cursor: pointer; transition: background 0.15s; }
  .btn-action:hover { background: var(--gray-200); }
  .btn-action.primary { background: var(--gold); border-color: var(--gold); color: var(--navy); }
  .btn-action.primary:hover { background: var(--gold-light); }
  #clipsOutput { background: var(--white); border: 1px solid var(--gray-200); border-radius: 4px; padding: 32px 36px; font-family: Arial, sans-serif; line-height: 1.6; }
  #clipsOutput .clips-title { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
  #clipsOutput .clips-date { font-size: 13px; color: #555; margin-bottom: 20px; }
  #clipsOutput .section-divider { border: none; border-top: 2px solid #1F497D; margin: 22px 0 10px; }
  #clipsOutput .section-heading { font-size: 14px; font-weight: 700; color: #1F497D; margin-bottom: 14px; }
  #clipsOutput .price-line { font-size: 13px; margin-bottom: 5px; }
  #clipsOutput .price-label { font-weight: 700; display: inline-block; min-width: 120px; }
  #clipsOutput .price-val { display: inline-block; min-width: 60px; }
  #clipsOutput .price-chg { color: #555; font-style: italic; font-size: 12px; }
  #clipsOutput .article { margin-bottom: 16px; padding-bottom: 16px; border-bottom: 1px solid #e8e3d9; }
  #clipsOutput .article:last-child { border-bottom: none; padding-bottom: 0; }
  #clipsOutput .article-title a { font-size: 13px; font-weight: 700; color: #1155CC; text-decoration: none; }
  #clipsOutput .article-title a:hover { text-decoration: underline; }
  #clipsOutput .article-meta { font-size: 11px; color: #888; margin: 3px 0 5px; font-style: italic; }
  #clipsOutput .article-snippet { font-size: 12px; color: #333; line-height: 1.65; }
  #clipsOutput .article-snippet b { color: #0f1f38; }
  #clipsOutput .empty-note { font-size: 13px; color: #999; font-style: italic; }
  .footer { text-align: center; font-size: 11px; color: var(--gray-400); margin-top: 36px; padding-top: 18px; border-top: 1px solid var(--gray-200); }
  @media (max-width: 600px) { .price-grid { grid-template-columns: 1fr 1fr; } .main { padding: 20px 16px 40px; } .masthead-inner { flex-direction: column; align-items: flex-start; gap: 10px; } }
</style>
</head>
<body>

<div class="masthead">
  <div class="masthead-inner">
    <div>
      <div class="masthead-title">AXPC Morning Clips</div>
      <div class="masthead-sub">American Exploration &amp; Production Council — Daily Media Digest</div>
    </div>
    <div class="masthead-badge">AI-Powered</div>
  </div>
</div>

<div class="main">

  <div class="card">
    <div class="card-label">Clips Date</div>
    <div class="field" style="max-width:200px;">
      <label>Date</label>
      <input type="date" id="clipsDate" />
    </div>
  </div>

  <div class="card">
    <div class="card-label">Commodity Prices</div>
    <div class="price-grid">
      <div>
        <div class="price-group-label">Oil (WTI)</div>
        <div class="field"><label>Price ($)</label><input type="text" id="wti" placeholder="90.44" /></div>
        <div class="field"><label>Change</label><input type="text" id="wtiC" placeholder="+1.76" /></div>
      </div>
      <div>
        <div class="price-group-label">Brent Crude</div>
        <div class="field"><label>Price ($)</label><input type="text" id="brent" placeholder="95.64" /></div>
        <div class="field"><label>Change</label><input type="text" id="brentC" placeholder="+1.35" /></div>
      </div>
      <div>
        <div class="price-group-label">Natural Gas</div>
        <div class="field"><label>Price ($)</label><input type="text" id="gas" placeholder="3.04" /></div>
        <div class="field"><label>Change</label><input type="text" id="gasC" placeholder="+0.15" /></div>
      </div>
    </div>
  </div>

  <button class="btn-generate" id="generateBtn" onclick="runClips()">Generate Morning Clips →</button>

  <div class="progress-wrap" id="progressWrap">
    <div class="progress-track"><div class="progress-bar" id="progressBar"></div></div>
    <div class="steps-row">
      <div class="step-pill" id="s1">AXPC Mentions</div>
      <div class="step-pill" id="s2">Member News</div>
      <div class="step-pill" id="s3">Industry News</div>
    </div>
    <div class="status-msg" id="statusMsg"></div>
  </div>

  <div class="output-wrap" id="outputWrap">
    <div class="output-actions">
      <button class="btn-action primary" id="copyBtn" onclick="copyClips()">⎘ Copy to Clipboard</button>
      <button class="btn-action" onclick="printClips()">⎙ Print / Save as PDF</button>
    </div>
    <div id="clipsOutput"></div>
  </div>

  <div class="footer">AXPC Morning Clips Generator &nbsp;·&nbsp; Searches approved sources only &nbsp;·&nbsp; For internal use only</div>
</div>

<script>
// ── CONFIG ──────────────────────────────────────────────────────────────────
const ANTHROPIC_KEY = "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";

const APPROVED_SITES = [
  "wsj.com","tulsaworld.com","denverpost.com","bismarcktribune.com",
  "post-gazette.com","inquirer.com","politico.com","bloomberg.com",
  "reuters.com","apnews.com","usatoday.com","ft.com","eenews.net",
  "foxnews.com","cbsnews.com","abcnews.go.com","nbcnews.com","msnbc.com",
  "cnn.com","oklahoman.com","nypost.com","nytimes.com",
  "washingtonexaminer.com","washingtonpost.com"
];

const SITE_FILTER = APPROVED_SITES.map(s => `site:${s}`).join(" OR ");

const MEMBERS = [
  "Antero Resources","Apache Corp","Ascent Resources","BKV",
  "California Resources Corporation","Caturus Energy","Chevron","Chord Energy",
  "Civitas Resources","ConocoPhillips","Coterra","Crescent Point Energy",
  "Devon Energy","Diamondback Energy","Diversified Energy","Expand Energy",
  "EOG Resources","EQT Corp","Hilcorp Energy","Jonah Energy",
  "Magnolia Oil & Gas","Mewbourne Oil","Northern Oil and Gas","Ovintiv",
  "Permian Resources","PureWest Energy","Range Resources","Seneca Resources",
  "SM Energy","TG Natural Resources"
];

// ── INIT ────────────────────────────────────────────────────────────────────
document.getElementById('clipsDate').value = new Date().toISOString().split('T')[0];

// ── HELPERS ─────────────────────────────────────────────────────────────────
const $ = id => document.getElementById(id);
function setStep(n, s) { $('s'+n).className = 'step-pill '+s; }
function setProgress(p) { $('progressBar').style.width = p+'%'; }
function setStatus(msg, cls) { const e = $('statusMsg'); e.textContent = msg; e.className = 'status-msg '+(cls||''); }
function escHtml(t) { return (t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function isApprovedSource(url) {
  try {
    const host = new URL(url).hostname.replace(/^www\./,'');
    return APPROVED_SITES.some(s => host === s || host.endsWith('.'+s));
  } catch(e) { return false; }
}

function dedup(arr) {
  const seen = new Set();
  return arr.filter(a => { if (!a.url || seen.has(a.url)) return false; seen.add(a.url); return true; });
}

function findMembers(item) {
  const text = ((item.title||'') + ' ' + (item.snippet||'')).toLowerCase();
  return MEMBERS.filter(m => text.includes(m.toLowerCase()));
}

function formatSource(url, dateShort) {
  try {
    const host = new URL(url).hostname.replace(/^www\./,'');
    const names = {
      'wsj.com':'The Wall Street Journal','bloomberg.com':'Bloomberg',
      'reuters.com':'Reuters','nytimes.com':'The New York Times',
      'washingtonpost.com':'The Washington Post','politico.com':'Politico',
      'eenews.net':'E&E News','foxnews.com':'Fox News','cnn.com':'CNN',
      'cbsnews.com':'CBS News','nbcnews.com':'NBC News','apnews.com':'AP News',
      'ft.com':'Financial Times','usatoday.com':'USA Today',
      'nypost.com':'New York Post','washingtonexaminer.com':'Washington Examiner',
      'msnbc.com':'MSNBC','inquirer.com':'The Philadelphia Inquirer',
      'denverpost.com':'The Denver Post','tulsaworld.com':'Tulsa World',
      'abcnews.go.com':'ABC News','post-gazette.com':'Pittsburgh Post-Gazette',
      'bismarcktribune.com':'Bismarck Tribune','oklahoman.com':'The Oklahoman'
    };
    const name = names[host] || host;
    return `${name}, ${dateShort}`;
  } catch(e) { return dateShort; }
}

// ── SINGLE API CALL WITH WEB SEARCH ─────────────────────────────────────────
async function claudeSearch(searchQuery, systemPrompt) {
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': ANTHROPIC_KEY,
      'anthropic-version': '2023-06-01',
      'anthropic-beta': 'web-search-2025-03-05'
    },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 4000,
      system: systemPrompt,
      tools: [{ type: 'web_search_20250305', name: 'web_search' }],
      messages: [{ role: 'user', content: searchQuery }]
    })
  });

  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.error?.message || 'API error ' + res.status);
  }

  const data = await res.json();
  const text = (data.content || []).filter(b => b.type === 'text').map(b => b.text).join('');

  // Extract JSON array from response
  try {
    const s = text.indexOf('['), e = text.lastIndexOf(']');
    if (s >= 0 && e > s) return JSON.parse(text.slice(s, e+1));
  } catch(err) {}
  return [];
}

// ── MAIN RUN ─────────────────────────────────────────────────────────────────
async function runClips() {
  const dateVal = $('clipsDate').value;
  const dateShort = dateVal
    ? new Date(dateVal+'T12:00:00').toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'})
    : new Date().toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'});
  const dateStr = dateVal
    ? new Date(dateVal+'T12:00:00').toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'})
    : new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});

  const prices = {
    wti:$('wti').value.trim(), wtiC:$('wtiC').value.trim(),
    brent:$('brent').value.trim(), brentC:$('brentC').value.trim(),
    gas:$('gas').value.trim(), gasC:$('gasC').value.trim()
  };

  $('generateBtn').disabled = true;
  $('outputWrap').className = 'output-wrap';
  $('progressWrap').className = 'progress-wrap show';
  ['s1','s2','s3'].forEach(id => $(id).className = 'step-pill');
  setProgress(0);

  const SYSTEM = (section) => `You are a media researcher compiling morning news clips for AXPC (American Exploration & Production Council).

Today is ${dateStr}. You must ONLY return articles from these approved sources: ${APPROVED_SITES.join(', ')}.

Search for articles published in the PAST 24 HOURS ONLY. Do NOT include anything older.

Return a JSON array only — no explanation, no markdown, no backticks. Each item:
{"title":"headline","url":"full article url","snippet":"first 2-3 sentences of the article"}

Section: ${section}. Maximum 10 results. Return [] if nothing found.`;

  try {
    // STEP 1: AXPC mentions
    setStep(1,'active'); setStatus('Searching AXPC mentions from the past 24 hours...');
    const axpcRaw = await claudeSearch(
      `Search these sources for articles from the past 24 hours mentioning "AXPC" OR "American Exploration and Production Council" OR "American Exploration & Production Council" OR "Anne Bradbury" OR "Parker Kasmer" OR "Tom Jorden" OR "Wendy Kirchoff" OR "Zach Gillan": ${SITE_FILTER}`,
      SYSTEM('AXPC Mentions — direct mentions of AXPC org or named staff only')
    );
    const axpc = dedup(axpcRaw.filter(a => isApprovedSource(a.url)));
    setStep(1,'done'); setProgress(33);

    // STEP 2: Member company news
    setStep(2,'active'); setStatus('Searching member company news from the past 24 hours...');
    const memberQ = MEMBERS.map(m=>`"${m}"`).join(' OR ');
    const memberRaw = await claudeSearch(
      `Search these sources for articles from the past 24 hours mentioning any of these companies: ${memberQ}. Sources: ${SITE_FILTER}`,
      SYSTEM('Select Member News — articles mentioning AXPC member oil & gas companies')
    );
    const axpcUrls = new Set(axpc.map(a=>a.url));
    const member = dedup(memberRaw.filter(a => isApprovedSource(a.url) && !axpcUrls.has(a.url)))
      .map(a => ({ ...a, boldTerms: findMembers(a), source: formatSource(a.url, dateShort) }))
      .filter(a => a.boldTerms.length > 0);
    setStep(2,'done'); setProgress(66);

    // STEP 3: Industry news
    setStep(3,'active'); setStatus('Searching industry news from the past 24 hours...');
    const industryRaw = await claudeSearch(
      `Search these sources for energy news articles from the past 24 hours about: oil prices, natural gas, LNG exports, American energy policy, fracking, methane emissions, upstream oil and gas, federal lands, permitting reform, energy security, climate legislation, crude oil exports, oil market. Sources: ${SITE_FILTER}`,
      SYSTEM('Industry News — relevant energy, oil & gas, and policy news')
    );
    const memberUrls = new Set(member.map(a=>a.url));
    const industry = dedup(industryRaw.filter(a => isApprovedSource(a.url) && !axpcUrls.has(a.url) && !memberUrls.has(a.url)))
      .map(a => ({ ...a, source: formatSource(a.url, dateShort) }));
    setStep(3,'done'); setProgress(100);

    // Add source formatting to axpc too
    const axpcFinal = axpc.map(a => ({ ...a, source: formatSource(a.url, dateShort) }));

    renderOutput({ axpc: axpcFinal, member, industry }, dateShort, prices);
    setStatus('Done! Copy to clipboard or print/save as PDF.', 'success');
    $('outputWrap').className = 'output-wrap show';

  } catch(err) {
    setStatus('Error: ' + err.message, 'error');
    console.error(err);
  }
  $('generateBtn').disabled = false;
}

// ── RENDER ───────────────────────────────────────────────────────────────────
function boldify(text, terms) {
  if (!terms || !terms.length) return escHtml(text);
  let s = escHtml(text);
  terms.forEach(t => {
    const re = new RegExp('('+t.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi');
    s = s.replace(re,'<b>$1</b>');
  });
  return s;
}

function articleHtml(a, useBold) {
  return `<div class="article">
    <div class="article-title"><a href="${escHtml(a.url||'#')}" target="_blank">${escHtml(a.title||'')}</a></div>
    <div class="article-meta">${escHtml(a.source||'')}</div>
    <div class="article-snippet">${useBold ? boldify(a.snippet||'',a.boldTerms) : escHtml(a.snippet||'')}</div>
  </div>`;
}

function renderOutput({ axpc, member, industry }, dateShort, prices) {
  const ph = [
    prices.wti   ? `<div class="price-line"><span class="price-label">Oil (WTI):</span><span class="price-val">$${escHtml(prices.wti)}</span>${prices.wtiC?`<span class="price-chg">&nbsp;&nbsp;${escHtml(prices.wtiC)} (from previous close)</span>`:''}</div>` : '',
    prices.brent ? `<div class="price-line"><span class="price-label">Brent Crude:</span><span class="price-val">$${escHtml(prices.brent)}</span>${prices.brentC?`<span class="price-chg">&nbsp;&nbsp;${escHtml(prices.brentC)} (from previous close)</span>`:''}</div>` : '',
    prices.gas   ? `<div class="price-line"><span class="price-label">Natural Gas:</span><span class="price-val">$${escHtml(prices.gas)}</span>${prices.gasC?`<span class="price-chg">&nbsp;&nbsp;${escHtml(prices.gasC)} (from previous close)</span>`:''}</div>` : ''
  ].join('');

  const sec = (arts, bold) => arts && arts.length
    ? arts.map(a => articleHtml(a, bold)).join('')
    : '<p class="empty-note">No articles found in the past 24 hours.</p>';

  $('clipsOutput').innerHTML = `
    <div class="clips-title">Daily News Clips</div>
    <div class="clips-date">${escHtml(dateShort)}</div>
    ${ph?`<hr class="section-divider"><div class="section-heading">Commodity Prices</div>${ph}`:''}
    <hr class="section-divider"><div class="section-heading">AXPC Mentions</div>${sec(axpc,false)}
    <hr class="section-divider"><div class="section-heading">Industry News</div>${sec(industry,false)}
    <hr class="section-divider"><div class="section-heading">Select Member News</div>${sec(member,true)}
  `;
}

// ── COPY & PRINT ─────────────────────────────────────────────────────────────
function copyClips() {
  const el = $('clipsOutput');
  const range = document.createRange();
  range.selectNodeContents(el);
  const sel = window.getSelection();
  sel.removeAllRanges(); sel.addRange(range);
  document.execCommand('copy');
  sel.removeAllRanges();
  $('copyBtn').textContent = '✓ Copied!';
  setTimeout(() => $('copyBtn').textContent = '⎘ Copy to Clipboard', 2000);
}

function printClips() {
  const w = window.open('','_blank');
  w.document.write(`<!DOCTYPE html><html><head><title>AXPC Morning Clips</title><style>
    body{font-family:Arial,sans-serif;max-width:750px;margin:32px auto;font-size:12px;line-height:1.6;color:#222;}
    hr{border:none;border-top:2px solid #1F497D;margin:18px 0 10px;}
    .section-heading{font-size:13px;font-weight:700;color:#1F497D;margin-bottom:12px;}
    .clips-title{font-size:17px;font-weight:700;}.clips-date{font-size:12px;color:#555;margin-bottom:16px;}
    .article{margin-bottom:13px;padding-bottom:13px;border-bottom:1px solid #ddd;}
    .article:last-child{border-bottom:none;}
    .article-title a{font-weight:700;color:#1155CC;text-decoration:none;}
    .article-meta{font-size:10px;color:#888;font-style:italic;margin:2px 0 4px;}
    .article-snippet{font-size:11px;color:#333;}
    b{color:#0f1f38;font-weight:700;}
    .price-label{font-weight:700;display:inline-block;min-width:120px;}
    .price-val{min-width:60px;display:inline-block;}
    .price-chg{font-style:italic;color:#555;}
    .empty-note{font-size:12px;color:#999;font-style:italic;}
  </style></head><body>${$('clipsOutput').innerHTML}</body></html>`);
